<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data:; connect-src 'self'; object-src 'none'; base-uri 'none';"
    />
    <title>bitbuu</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
        background: #1e1e1e;
        color: #eee;
        font:
          14px system-ui,
          sans-serif;
      }
      canvas#stage {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }
      #palette {
        position: absolute;
        bottom: 12px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 4px;
        padding: 6px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 6px;
      }
      #palette button {
        width: 24px;
        height: 24px;
        border: 2px solid transparent;
        border-radius: 3px;
        cursor: pointer;
        padding: 0;
        background-clip: padding-box;
      }
      #palette button[aria-pressed='true'] {
        border-color: #fff;
      }
    </style>
  </head>
  <body>
    <canvas id="stage"></canvas>
    <div id="palette" role="toolbar" aria-label="Palette"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
